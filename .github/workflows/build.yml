name: NetBird AWG GoReleaser

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      base_tag:
        description: "Upstream netbird tag (example: v0.66.0). Empty => from .env"
        required: false
        default: ""
        type: string
      publish_release:
        description: "Create GitHub release with tag <base_tag>-awg"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  snapshot:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_release != 'true' }}
    runs-on: ubuntu-latest
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_tag || '' }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Resolve version variables
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        id: setup_go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Install cross-compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Detect build parallelism
        id: parallelism
        run: echo "value=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Prepare patched sources
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Run GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: release --clean --snapshot --config .goreleaser.awg.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOMAXPROCS: ${{ steps.parallelism.outputs.value }}

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ github.run_number }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/workdir/repos/netbird/dist
          if-no-files-found: error
          retention-days: 7

  snapshot_windows_installers:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_release != 'true' }}
    needs: snapshot
    runs-on: windows-latest
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_tag || '' }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Configure Git line endings for patches
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git -C "$GITHUB_WORKSPACE" config core.autocrlf false
          git -C "$GITHUB_WORKSPACE" reset --hard HEAD
          git -C "$GITHUB_WORKSPACE" clean -fd

      - name: Resolve version variables
        shell: bash
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        shell: bash
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Setup .NET SDK (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install windows installer dependencies
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          dotnet tool install --global wix --version 5.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare patched sources
        shell: bash
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Download snapshot dist artifact
        uses: actions/download-artifact@v4
        with:
          name: snapshot-${{ github.run_number }}-${{ github.sha }}
          path: ${{ github.workspace }}/workdir/repos/netbird

      - name: Verify dist directory
        shell: bash
        run: |
          if [[ ! -d "$GITHUB_WORKSPACE/workdir/repos/netbird/dist" ]]; then
            echo "[error] dist directory not found after artifact download"
            find "$GITHUB_WORKSPACE/workdir/repos/netbird" -maxdepth 5 -type d | sort
            exit 1
          fi

      - name: Build windows installer (.exe)
        shell: bash
        run: ./scripts/build_windows_installer.sh

      - name: Build windows installer (.msi)
        shell: bash
        run: ./scripts/build_windows_msi.sh

      - name: Upload snapshot windows installers
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-windows-installers-${{ github.run_number }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/workdir/repos/netbird/dist/netbird_installer_*_windows_amd64.exe
            ${{ github.workspace }}/workdir/repos/netbird/dist/netbird_installer_*_windows_amd64.msi
          if-no-files-found: error
          retention-days: 7

  snapshot_ui_darwin:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_release != 'true' }}
    runs-on: macos-latest
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_tag || '' }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Resolve version variables
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        id: setup_go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Prepare patched sources
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Run GoReleaser snapshot build (netbird-ui darwin)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: build --clean --config .goreleaser_ui_darwin.awg.yaml --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build darwin installers (.pkg)
        run: ./scripts/build_darwin_pkg.sh

      - name: Upload snapshot darwin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-darwin-ui-${{ github.run_number }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/workdir/repos/netbird/dist/**
          if-no-files-found: error
          retention-days: 7

  release:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: awg-release
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event.inputs.base_tag }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Resolve version variables
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        id: setup_go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Install cross-compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Detect build parallelism
        id: parallelism
        run: echo "value=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Prepare patched sources
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Prepare git tag for GoReleaser release
        run: ./scripts/prepare_netbird_release_git.sh

      - name: Run GoReleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: release --clean --config .goreleaser.awg.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOMAXPROCS: ${{ steps.parallelism.outputs.value }}

      - name: Upload release dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ github.run_number }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/workdir/repos/netbird/dist
          if-no-files-found: error
          retention-days: 2

  release_windows_installers:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
    needs: release
    runs-on: windows-latest
    environment:
      name: awg-release
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event.inputs.base_tag }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Configure Git line endings for patches
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git -C "$GITHUB_WORKSPACE" config core.autocrlf false
          git -C "$GITHUB_WORKSPACE" reset --hard HEAD
          git -C "$GITHUB_WORKSPACE" clean -fd

      - name: Resolve version variables
        shell: bash
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        shell: bash
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Setup .NET SDK (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install windows installer dependencies
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          dotnet tool install --global wix --version 5.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare patched sources
        shell: bash
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Download release dist artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist-${{ github.run_number }}-${{ github.sha }}
          path: ${{ github.workspace }}/workdir/repos/netbird

      - name: Verify dist directory
        shell: bash
        run: |
          if [[ ! -d "$GITHUB_WORKSPACE/workdir/repos/netbird/dist" ]]; then
            echo "[error] dist directory not found after artifact download"
            find "$GITHUB_WORKSPACE/workdir/repos/netbird" -maxdepth 5 -type d | sort
            exit 1
          fi

      - name: Build windows installer (.exe)
        shell: bash
        run: ./scripts/build_windows_installer.sh

      - name: Build windows installer (.msi)
        shell: bash
        run: ./scripts/build_windows_msi.sh

      - name: Upload windows installers to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/workdir/repos/netbird/dist"
          shopt -s nullglob
          exes=(netbird_installer_*_windows_amd64.exe)
          msis=(netbird_installer_*_windows_amd64.msi)
          if [[ "${#exes[@]}" -eq 0 || "${#msis[@]}" -eq 0 ]]; then
            echo "[error] expected both .exe and .msi installers in dist/"
            find . -maxdepth 2 -type f | sort
            exit 1
          fi
          files=("${exes[@]}" "${msis[@]}")
          for file in "${files[@]}"; do
            gh release upload "$NETBIRD_RELEASE_TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done

  release_ui_darwin:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
    needs: release
    runs-on: macos-latest
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event.inputs.base_tag }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Resolve version variables
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        id: setup_go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Prepare patched sources
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Prepare git tag for GoReleaser release
        run: ./scripts/prepare_netbird_release_git.sh

      - name: Run GoReleaser build (netbird-ui darwin)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: build --clean --config .goreleaser_ui_darwin.awg.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build darwin installers (.pkg)
        run: ./scripts/build_darwin_pkg.sh

      - name: Upload netbird-ui darwin artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$GITHUB_WORKSPACE/workdir/repos/netbird"
          shopt -s nullglob
          files=(dist/netbird_*_darwin_amd64.pkg dist/netbird_*_darwin_arm64.pkg)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "[error] no darwin pkg artifacts found in dist/"
            find dist -maxdepth 4 -type f | sort
            exit 1
          fi

          for file in "${files[@]}"; do
            gh release upload "$NETBIRD_RELEASE_TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done

  release_management_container:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: awg-release
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event.inputs.base_tag }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Resolve version variables
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Prepare patched sources
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push management docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/workdir/repos/netbird
          file: ${{ github.workspace }}/workdir/repos/netbird/management/Dockerfile.multistage
          build-contexts: |
            amneziawg-go=${{ github.workspace }}/workdir/repos/amneziawg-go
            amneziawg-windows=${{ github.workspace }}/workdir/repos/amneziawg-windows
          platforms: linux/amd64
          tags: |
            spikeyspik/netbird_awg_management:${{ env.NETBIRD_RELEASE_TAG }}
            spikeyspik/netbird_awg_management:latest
          outputs: type=registry,compression=zstd,compression-level=12,force-compression=true
          cache-from: type=gha,scope=management-image
          cache-to: type=gha,mode=max,scope=management-image

  release_client_container:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: awg-release
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ github.event.inputs.base_tag }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Resolve version variables
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone upstream sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go (from cloned netbird go.mod)
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Prepare patched sources
        run: SKIP_CLONE=1 ./scripts/prepare_sources.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build client binaries (linux amd64/armv7/arm64)
        run: |
          cd "$GITHUB_WORKSPACE/workdir/repos/netbird"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o netbird-linux-amd64 ./client
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="-s -w" -o netbird-linux-armv7 ./client
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o netbird-linux-arm64 ./client

      - name: Build and push client arch images (original Dockerfile)
        run: |
          cd "$GITHUB_WORKSPACE/workdir/repos/netbird"
          REPO="spikeyspik/netbird_awg"

          docker buildx build \
            --platform linux/amd64 \
            -f client/Dockerfile \
            --build-arg NETBIRD_BINARY=netbird-linux-amd64 \
            -t "${REPO}:${NETBIRD_RELEASE_TAG}-linux-amd64" \
            --output "type=registry,compression=zstd,compression-level=12,force-compression=true" .

          docker buildx build \
            --platform linux/arm/v7 \
            -f client/Dockerfile \
            --build-arg NETBIRD_BINARY=netbird-linux-armv7 \
            -t "${REPO}:${NETBIRD_RELEASE_TAG}-linux-armv7" \
            --output "type=registry,compression=zstd,compression-level=12,force-compression=true" .

          docker buildx build \
            --platform linux/arm64 \
            -f client/Dockerfile \
            --build-arg NETBIRD_BINARY=netbird-linux-arm64 \
            -t "${REPO}:${NETBIRD_RELEASE_TAG}-linux-arm64" \
            --output "type=registry,compression=zstd,compression-level=12,force-compression=true" .

      - name: Create and push multi-arch manifests
        run: |
          REPO="spikeyspik/netbird_awg"
          docker buildx imagetools create \
            -t "${REPO}:${NETBIRD_RELEASE_TAG}" \
            "${REPO}:${NETBIRD_RELEASE_TAG}-linux-amd64" \
            "${REPO}:${NETBIRD_RELEASE_TAG}-linux-armv7" \
            "${REPO}:${NETBIRD_RELEASE_TAG}-linux-arm64"

          docker buildx imagetools create \
            -t "${REPO}:latest" \
            "${REPO}:${NETBIRD_RELEASE_TAG}-linux-amd64" \
            "${REPO}:${NETBIRD_RELEASE_TAG}-linux-armv7" \
            "${REPO}:${NETBIRD_RELEASE_TAG}-linux-arm64"
