name: NetBird AWG Build

on:
  push:
  workflow_dispatch:
  workflow_call:
    inputs:
      base_tag:
        description: Base tag (e.g. v0.66.0)
        required: false
        default: ""
        type: string
      release_mode:
        description: Use release build mode instead of snapshot
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build_linux:
    runs-on: ubuntu-latest
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ inputs.base_tag || '' }}
      RELEASE_MODE: ${{ inputs.release_mode && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve vars
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Prepare sources
        run: ./scripts/prepare_sources.sh

      - name: Prepare release tag in source tree
        if: ${{ env.RELEASE_MODE == 'true' }}
        run: ./scripts/prepare_netbird_release_git.sh

      - name: Build (release local)
        if: ${{ env.RELEASE_MODE == 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: release --clean --config .goreleaser.awg.yaml --skip=publish --skip=validate --skip=nfpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (snapshot)
        if: ${{ env.RELEASE_MODE != 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: release --clean --snapshot --config .goreleaser.awg.yaml --skip=nfpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build linux packages (.deb/.rpm/.archlinux)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: release --clean --snapshot --config .goreleaser.awg.nfpm.yaml --skip=archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-${{ github.run_number }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/workdir/repos/netbird/dist/netbird_*_linux_amd64*
            ${{ github.workspace }}/workdir/repos/netbird/dist/netbird_*_linux_arm64*
            ${{ github.workspace }}/workdir/repos/netbird/dist-nfpm/*.deb
            ${{ github.workspace }}/workdir/repos/netbird/dist-nfpm/*.rpm
            ${{ github.workspace }}/workdir/repos/netbird/dist-nfpm/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 7

  build_windows:
    runs-on: windows-latest
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ inputs.base_tag || '' }}
      PRODUCT_NAME: NetBird AWG
      COPYRIGHT: "NetBird GmbH, NetBird AWG contributors"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git -C "$GITHUB_WORKSPACE" config core.autocrlf false
          git -C "$GITHUB_WORKSPACE" reset --hard HEAD
          git -C "$GITHUB_WORKSPACE" clean -fd

      - name: Resolve vars
        shell: bash
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Parse semver string
        id: semver_parser
        uses: booxmedialtd/ws-action-parse-semver@v1
        with:
          input_string: ${{ env.NETBIRD_RELEASE_TAG }}

      - name: Clone sources
        shell: bash
        run: ./scripts/clone_sources.sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@233067e

      - name: Prepare sources
        shell: bash
        run: ./scripts/prepare_sources.sh

      - name: Generate Windows assets
        working-directory: ${{ github.workspace }}/workdir/repos/netbird
        run: |
          goversioninfo -icon client/ui/assets/netbird.ico -manifest client/manifest.xml -product-name "${{ env.PRODUCT_NAME }}" -copyright "${{ env.COPYRIGHT }}" -ver-major ${{ steps.semver_parser.outputs.major }} -ver-minor ${{ steps.semver_parser.outputs.minor }} -ver-patch ${{ steps.semver_parser.outputs.patch }} -ver-build 0 -file-version ${{ steps.semver_parser.outputs.fullversion }}.0 -product-version ${{ steps.semver_parser.outputs.fullversion }}.0 -o client/resources_windows_amd64.syso
          goversioninfo -64 -icon client/ui/assets/netbird.ico -manifest client/ui/manifest.xml -product-name "${{ env.PRODUCT_NAME }}-UI" -copyright "${{ env.COPYRIGHT }}" -ver-major ${{ steps.semver_parser.outputs.major }} -ver-minor ${{ steps.semver_parser.outputs.minor }} -ver-patch ${{ steps.semver_parser.outputs.patch }} -ver-build 0 -file-version ${{ steps.semver_parser.outputs.fullversion }}.0 -product-version ${{ steps.semver_parser.outputs.fullversion }}.0 -o client/ui/resources_windows_amd64.syso
      - name: Build Windows binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: build --clean --snapshot --config .goreleaser.awg.installers.yaml --id netbird-windows-amd64 --id netbird-ui-windows-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .exe
        shell: bash
        run: ./scripts/build_windows_installer.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-${{ github.run_number }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/workdir/repos/netbird/dist/netbird_installer_*_windows_amd64.exe
          if-no-files-found: error
          retention-days: 7

  build_darwin:
    runs-on: macos-latest
    env:
      WORKDIR: ${{ github.workspace }}/workdir
      BASE_TAG: ${{ inputs.base_tag || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve vars
        run: |
          ./scripts/version_vars.sh --github-env >> "$GITHUB_ENV"
          ./scripts/version_vars.sh --print

      - name: Clone sources
        run: ./scripts/clone_sources.sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ github.workspace }}/workdir/repos/netbird/go.mod
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}/workdir/repos/netbird/go.mod
            ${{ github.workspace }}/workdir/repos/netbird/go.sum

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Prepare sources
        run: ./scripts/prepare_sources.sh

      - name: Build darwin binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ github.workspace }}/workdir/repos/netbird
          args: build --clean --snapshot --config .goreleaser.awg.installers.yaml --id netbird-darwin --id netbird-ui-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .pkg
        run: ./scripts/build_darwin_pkg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-darwin-${{ github.run_number }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/workdir/repos/netbird/dist/netbird_*_darwin_amd64.pkg
            ${{ github.workspace }}/workdir/repos/netbird/dist/netbird_*_darwin_arm64.pkg
          if-no-files-found: error
          retention-days: 7
